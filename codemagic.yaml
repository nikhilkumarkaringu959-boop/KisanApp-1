workflows:
  android-release:
    name: KisanApp Android Free
    max_build_duration: 60
    instance_type: linux  # ← IDI CHANGE CHESANU. linux_x2 free lo undadu
    environment:
      node: 18
      java: 17
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
    scripts:
      - name: Install npm dependencies
        script: | 
          npm install --legacy-peer-deps
      - name: Expo prebuild
        script: | 
          npx expo prebuild --platform android
      - name: Build Android Debug APK
        script: | 
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
